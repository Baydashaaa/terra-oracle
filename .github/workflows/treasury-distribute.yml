name: Treasury Distribution

on:
  schedule:
    # Every Wednesday at 20:00 UTC
    - cron: '0 20 * * 3'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab
    inputs:
      dry_run:
        description: 'Dry run (print plan without sending transactions)'
        required: false
        default: 'false'

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run treasury distribution
        env:
          TREASURY_MNEMONIC: ${{ secrets.TREASURY_MNEMONIC }}
        run: node scripts/treasury-distribute.js

      - name: Log completion
        if: always()
        run: echo "Treasury distribution completed at $(date -u)"
