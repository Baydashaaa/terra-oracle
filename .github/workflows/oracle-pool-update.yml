name: Update Oracle Pool Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and update
        run: |
          ADDR="terra1jgp27m8fykex4e4jtt0l7ze8q528ux2lh4zh0f"
          DATA=""
          for BASE in "https://lcd.terra-classic.hexxagon.io" "https://terra-classic-lcd.publicnode.com" "https://api-lunc-lcd.binodes.com"; do
            DATA=$(curl -sf --max-time 10 "$BASE/cosmos/bank/v1beta1/balances/$ADDR" || true)
            if [ -n "$DATA" ]; then echo "OK: $BASE"; break; fi
          done
          if [ -z "$DATA" ]; then echo "All endpoints failed"; exit 1; fi
          mkdir -p assets/data
          echo "$DATA" > /tmp/balance.json
          python3 update_pool.py

      - name: Commit and push
        run: |
          git config user.name "oracle-bot"
          git config user.email "oracle-bot@users.noreply.github.com"
          git add assets/data/oracle-pool.json
          git diff --staged --quiet || git commit -m "chore: update oracle pool data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
