name: REP Rewards Payout
on:
  schedule:
    - cron: '0 20 * * 2'   # every Tuesday at 20:00 UTC
  workflow_dispatch:

jobs:
  payout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          cd scripts
          npm init -y
          npm pkg set type="module"
          npm install @terra-money/feather.js node-fetch

      - name: Run REP rewards payout
        env:
          REWARDS_MNEMONIC: ${{ secrets.REWARDS_MNEMONIC }}
          ACTIONS_SECRET:   ${{ secrets.ACTIONS_SECRET }}
          WORKER_URL:       https://terra-oracle-questions.vladislav-baydan.workers.dev
        run: node scripts/rep-rewards.js
