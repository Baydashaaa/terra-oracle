name: Update Free Entries

on:
  schedule:
    - cron: '0 * * * *'   # каждый час
  workflow_dispatch:        # можно запустить вручную

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Run update script
        run: node .github/scripts/update-free-entries.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add free-entries.json
          git diff --staged --quiet || git commit -m "chore: update free-entries [skip ci]"
          git push
