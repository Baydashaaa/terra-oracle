<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    var path = window.location.pathname.replace(/^\//, '');
    var parts = path.split('/');
    var validPages = ['home','board','ask','chat','vote','about','bag','treasury','reputation'];
    var page = validPages.includes(parts[0]) ? parts[0] : 'home';
    var hash = page;
    if (page === 'reputation' && parts[1]) {
      hash = page + '/' + parts[1];
    }
    window.location.replace('/#' + hash);
  </script>
</head>
<body></body>
</html>
